  const [nights, setNights] = useState(1);
  const [activeTravelers, setActiveTravelers] = useState(TRAVELERS.map(t => t.id));
  const [selectedTraveler, setSelectedTraveler] = useState(TRAVELERS[0].id);
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem(`packing-base-${scene.id}`);
      if (saved) {
        const base = JSON.parse(saved);
        const fresh = {};
        Object.keys(base).forEach(k => { fresh[k] = base[k].map(i => ({ ...i, checked: false })); });
        return fresh;
      }
    } catch(e) {}
    return defaultItems;
  });
  const [baseItems, setBaseItems] = useState(() => {
    try {
      const saved = localStorage.getItem(`packing-base-${scene.id}`);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return defaultItems;
  });
  const [selectedCategory, setSelectedCategory] = useState("all");
  const [newItemName, setNewItemName] = useState("");
  const [newItemCategory, setNewItemCategory] = useState(CATEGORIES[0].id);
  const [showForgottenOnly, setShowForgottenOnly] = useState(false);
  const [editingItemId, setEditingItemId] = useState(null);
  const [editingName, setEditingName] = useState("");
  const [isBaseEditMode, setIsBaseEditMode] = useState(false);

  const saveBase = (newBase) => {
    try { localStorage.setItem(`packing-base-${scene.id}`, JSON.stringify(newBase)); } catch(e) {}
  };

  const changeNights = (n) => {
    setNights(n);
    if (!isTravel) return;
    setItems(prev => {
      const next = { ...prev };
      TRAVEL_NIGHTS_DEPENDENT.forEach(({ traveler, id, getName }) => {
        if (next[traveler]) next[traveler] = next[traveler].map(item => item.id === id ? { ...item, name: getName(n) } : item);
      });
      return next;
    });
  };

  const toggleTraveler = (id) => {
    const isActive = activeTravelers.includes(id);
    if (isActive) {
      const next = activeTravelers.filter(t => t !== id);
      setActiveTravelers(next);
      if (selectedTraveler === id) setSelectedTraveler(next[0] || null);
    } else {
      setActiveTravelers(prev => [...prev, id]);
      setSelectedTraveler(id);
    }
  };

  const toggleItem = (traveler, itemId) => {
    if (isBaseEditMode) return;
    setItems(prev => ({ ...prev, [traveler]: prev[traveler].map(item => item.id === itemId ? { ...item, checked: !item.checked } : item) }));
  };

  const addItem = () => {
    if (!newItemName.trim()) return;
    const newItem = { id: Date.now(), name: newItemName.trim(), category: newItemCategory, checked: false };
    if (isBaseEditMode) {
      const newBase = { ...baseItems, [selectedTraveler]: [...(baseItems[selectedTraveler] || []), newItem] };
      setBaseItems(newBase); setItems(prev => ({ ...prev, [selectedTraveler]: [...(prev[selectedTraveler] || []), newItem] })); saveBase(newBase);
    } else {
      setItems(prev => ({ ...prev, [selectedTraveler]: [...prev[selectedTraveler], newItem] }));
    }
    setNewItemName("");
  };

  const deleteItem = (traveler, itemId) => {
    if (isBaseEditMode) {
      const newBase = { ...baseItems, [traveler]: baseItems[traveler].filter(i => i.id !== itemId) };
      setBaseItems(newBase); setItems(prev => ({ ...prev, [traveler]: prev[traveler].filter(i => i.id !== itemId) })); saveBase(newBase);
    } else {
      setItems(prev => ({ ...prev, [traveler]: prev[traveler].filter(i => i.id !== itemId) }));
    }
  };

  const startEdit = (item) => { setEditingItemId(item.id); setEditingName(item.name); };
  const saveEdit = (traveler, itemId) => {
    if (!editingName.trim()) return;
    if (isBaseEditMode) {
      const newBase = { ...baseItems, [traveler]: baseItems[traveler].map(i => i.id === itemId ? { ...i, name: editingName.trim() } : i) };
      setBaseItems(newBase); setItems(prev => ({ ...prev, [traveler]: prev[traveler].map(i => i.id === itemId ? { ...i, name: editingName.trim() } : i) })); saveBase(newBase);
    } else {
      setItems(prev => ({ ...prev, [traveler]: prev[traveler].map(i => i.id === itemId ? { ...i, name: editingName.trim() } : i) }));
    }
    setEditingItemId(null); setEditingName("");
  };

  const currentItems = items[selectedTraveler] || [];
  const filteredItems = currentItems.filter(item => {
    if (showForgottenOnly && item.checked) return false;
    if (selectedCategory !== "all" && item.category !== selectedCategory) return false;
    return true;
  });
  const checkedCount = currentItems.filter(i => i.checked).length;
  const totalCount = currentItems.length;
  const progress = totalCount === 0 ? 0 : Math.round(checkedCount / totalCount * 100);
  const travelerData = TRAVELERS.find(t => t.id === selectedTraveler);
  const allChecked = activeTravelers.reduce((sum, t) => sum + (items[t]?.filter(i => i.checked).length || 0), 0);
  const allTotal = activeTravelers.reduce((sum, t) => sum + (items[t]?.length || 0), 0);
  const usedCategoryIds = [...new Set(currentItems.map(i => i.category))];

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 80 }}>
      {/* Header */}
      <div style={{ background: scene.grad, padding: "20px 20px 24px", color: "white", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 120, height: 120, borderRadius: "50%", background: "rgba(255,255,255,0.1)" }} />
        <button onClick={onBack} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "white", borderRadius: 20, padding: "4px 14px", fontSize: 13, cursor: "pointer", marginBottom: 10 }}>← ホーム</button>
        <div style={{ fontSize: 11, opacity: 0.8, letterSpacing: 2, marginBottom: 4 }}>{scene.emoji} {scene.label.toUpperCase()} PACKING</div>
        <div style={{ fontSize: 22, fontWeight: "bold", marginBottom: 14 }}>{scene.label}の持ち物リスト</div>
        {isTravel && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <span style={{ fontSize: 12, opacity: 0.85 }}>🌙 宿泊数：</span>
            <div style={{ display: "flex", gap: 6 }}>
              {[1,2,3].map(n => (
                <button key={n} onClick={() => changeNights(n)} style={{ padding: "5px 16px", borderRadius: 20, border: "2px solid rgba(255,255,255,0.7)", background: nights === n ? "white" : "transparent", color: nights === n ? scene.color : "white", fontSize: 14, fontWeight: "bold", cursor: "pointer" }}>{n}泊</button>
              ))}
            </div>
            <span style={{ fontSize: 11, opacity: 0.7 }}>（{nights + 1}日間）</span>
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ flex: 1, height: 6, borderRadius: 3, background: "rgba(255,255,255,0.3)" }}>
            <div style={{ height: "100%", borderRadius: 3, background: "white", width: `${allTotal === 0 ? 0 : Math.round(allChecked / allTotal * 100)}%`, transition: "width 0.4s ease" }} />
          </div>
          <div style={{ fontSize: 13, fontWeight: "bold", whiteSpace: "nowrap" }}>{allChecked}/{allTotal} 完了</div>
        </div>
      </div>

      <div style={{ padding: "0 16px" }}>
        {/* メンバー */}
        <div style={{ marginTop: 20, marginBottom: 8 }}>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 8, fontWeight: "bold", letterSpacing: 1 }}>メンバー（タップで追加／削除）</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {TRAVELERS.map(t => {
              const isActive = activeTravelers.includes(t.id);
              return <button key={t.id} onClick={() => toggleTraveler(t.id)} style={{ padding: "6px 14px", borderRadius: 20, border: `2px solid ${t.color}`, background: isActive ? t.color : "white", color: isActive ? "white" : t.color, fontSize: 13, fontWeight: "bold", cursor: "pointer" }}>{t.emoji} {t.label}</button>;
            })}
          </div>
        </div>

        {/* タブ */}
        {activeTravelers.length > 0 && (
          <div style={{ display: "flex", gap: 8, marginTop: 16, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
            {activeTravelers.map(tid => {
              const t = TRAVELERS.find(x => x.id === tid);
              const itms = items[tid] || [];
              const done = itms.filter(i => i.checked).length;
              const isSel = selectedTraveler === tid;
              return (
                <button key={tid} onClick={() => setSelectedTraveler(tid)} style={{ flexShrink: 0, padding: "10px 12px 10px 16px", borderRadius: 14, border: "none", background: isSel ? t.color : "white", color: isSel ? "white" : "#444", fontSize: 12, fontWeight: "bold", cursor: "pointer", boxShadow: isSel ? `0 4px 12px ${t.color}55` : "0 2px 8px rgba(0,0,0,0.08)", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 76, position: "relative" }}>
                  <span onClick={e => { e.stopPropagation(); toggleTraveler(tid); }} style={{ position: "absolute", top: 4, right: 4, width: 16, height: 16, borderRadius: "50%", background: isSel ? "rgba(255,255,255,0.35)" : "#e0e0e0", color: isSel ? "white" : "#888", fontSize: 10, fontWeight: "bold", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>×</span>
                  <span style={{ fontSize: 20 }}>{t.emoji}</span>
                  <span>{t.label}</span>
                  <span style={{ fontSize: 10, opacity: 0.8, background: isSel ? "rgba(255,255,255,0.25)" : "#f0f0f0", borderRadius: 10, padding: "1px 6px" }}>{done}/{itms.length}</span>
                </button>
              );
            })}
          </div>
        )}

        {activeTravelers.includes(selectedTraveler) && (
          <>
            {/* プログレス */}
            <div style={{ background: "white", borderRadius: 16, padding: "14px 16px", marginBottom: 14, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, fontSize: 13 }}>
                <span style={{ fontWeight: "bold", color: travelerData?.color }}>{travelerData?.emoji} {travelerData?.label}の準備</span>
                <span style={{ color: "#666" }}>{progress}% 完了</span>
              </div>
              <div style={{ height: 8, background: "#f0f0f0", borderRadius: 4 }}>
                <div style={{ height: "100%", borderRadius: 4, background: `linear-gradient(90deg, ${travelerData?.color}, ${travelerData?.color}99)`, width: `${progress}%`, transition: "width 0.4s ease" }} />
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: "#999" }}>{checkedCount}/{totalCount} アイテム</div>
            </div>

            {/* 基本データ編集バナー */}
            {isBaseEditMode && (
              <div style={{ background: "#FFF3CD", border: "1.5px solid #F2CC8F", borderRadius: 12, padding: "10px 14px", marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, color: "#856404", fontWeight: "bold" }}>✏️ 基本データ編集中 — 変更は自動保存</span>
                <button onClick={() => setIsBaseEditMode(false)} style={{ background: "#856404", color: "white", border: "none", borderRadius: 8, padding: "4px 12px", fontSize: 12, cursor: "pointer", fontWeight: "bold" }}>完了</button>
              </div>
            )}

            {/* カテゴリフィルター */}
            <div style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                <button onClick={() => setSelectedCategory("all")} style={{ flexShrink: 0, padding: "5px 12px", borderRadius: 20, border: `1.5px solid ${selectedCategory === "all" ? scene.color : "#ddd"}`, background: selectedCategory === "all" ? scene.color : "white", color: selectedCategory === "all" ? "white" : "#555", fontSize: 12, cursor: "pointer", fontWeight: "bold" }}>すべて</button>
                {CATEGORIES.filter(c => usedCategoryIds.includes(c.id)).map(cat => (
                  <button key={cat.id} onClick={() => setSelectedCategory(cat.id)} style={{ flexShrink: 0, padding: "5px 12px", borderRadius: 20, border: `1.5px solid ${selectedCategory === cat.id ? cat.color : "#ddd"}`, background: selectedCategory === cat.id ? cat.color : "white", color: selectedCategory === cat.id ? "white" : "#555", fontSize: 12, cursor: "pointer", fontWeight: "bold" }}>{cat.label}</button>
                ))}
              </div>
              <div style={{ marginTop: 8, display: "flex", gap: 8, flexWrap: "wrap" }}>
                {!isBaseEditMode && (
                  <button onClick={() => setShowForgottenOnly(!showForgottenOnly)} style={{ padding: "5px 14px", borderRadius: 20, border: `1.5px solid ${showForgottenOnly ? "#E07A5F" : "#ddd"}`, background: showForgottenOnly ? "#E07A5F" : "white", color: showForgottenOnly ? "white" : "#555", fontSize: 12, cursor: "pointer", fontWeight: "bold" }}>⚠️ 未チェックのみ表示</button>
                )}
                <button onClick={() => { setIsBaseEditMode(!isBaseEditMode); setShowForgottenOnly(false); }} style={{ padding: "5px 14px", borderRadius: 20, border: `1.5px solid ${isBaseEditMode ? "#856404" : "#ddd"}`, background: isBaseEditMode ? "#FFF3CD" : "white", color: isBaseEditMode ? "#856404" : "#888", fontSize: 12, cursor: "pointer", fontWeight: isBaseEditMode ? "bold" : "normal" }}>⚙️ 基本データを編集</button>
              </div>
            </div>

            {/* アイテムリスト */}
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {CATEGORIES.filter(cat => selectedCategory === "all" || selectedCategory === cat.id).map(cat => {
                const catItems = filteredItems.filter(i => i.category === cat.id);
                if (catItems.length === 0) return null;
                return (
                  <div key={cat.id} style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: cat.color, fontWeight: "bold", letterSpacing: 1, marginBottom: 6, marginTop: 4, display: "flex", alignItems: "center", gap: 4 }}>
                      {cat.label}
                      <span style={{ fontSize: 10, background: cat.color + "22", color: cat.color, borderRadius: 10, padding: "1px 6px" }}>{catItems.filter(i => i.checked).length}/{catItems.length}</span>
                    </div>
                    {catItems.map(item => (
                      <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, background: "white", borderRadius: 12, padding: "11px 14px", marginBottom: 5, boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderLeft: `3px solid ${item.checked ? "#ddd" : cat.color}`, opacity: item.checked ? 0.5 : 1, transition: "all 0.2s" }}>
                        <div onClick={() => toggleItem(selectedTraveler, item.id)} style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${item.checked ? "#ccc" : cat.color}`, background: item.checked ? cat.color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: isBaseEditMode ? "default" : "pointer", flexShrink: 0, transition: "all 0.2s" }}>
                          {item.checked && <span style={{ color: "white", fontSize: 12, fontWeight: "bold" }}>✓</span>}
                        </div>
                        {editingItemId === item.id ? (
                          <>
                            <input autoFocus value={editingName} onChange={e => setEditingName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") saveEdit(selectedTraveler, item.id); if (e.key === "Escape") setEditingItemId(null); }} style={{ flex: 1, fontSize: 13, border: `1.5px solid ${cat.color}`, borderRadius: 8, padding: "4px 8px", outline: "none" }} />
                            <button onClick={() => saveEdit(selectedTraveler, item.id)} style={{ background: cat.color, color: "white", border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 12, cursor: "pointer", fontWeight: "bold" }}>保存</button>
                            <button onClick={() => setEditingItemId(null)} style={{ background: "none", border: "none", color: "#aaa", fontSize: 16, cursor: "pointer", padding: "0 2px" }}>✕</button>
                          </>
                        ) : (
                          <>
                            <span style={{ flex: 1, fontSize: 13, lineHeight: 1.4, textDecoration: item.checked ? "line-through" : "none", color: item.checked ? "#aaa" : "#333" }}>{item.name}</span>
                            <button onClick={() => startEdit(item)} style={{ background: "none", border: "none", color: "#ccc", fontSize: 13, cursor: "pointer", padding: "0 2px" }}>✏️</button>
                            <button onClick={() => deleteItem(selectedTraveler, item.id)} style={{ background: "none", border: "none", color: "#ddd", fontSize: 16, cursor: "pointer", padding: "0 4px" }}>×</button>
                          </>
                        )}
                      </div>
                    ))}
                  </div>
                );
              })}
              {filteredItems.length === 0 && <div style={{ textAlign: "center", padding: "30px", color: "#bbb", fontSize: 14 }}>{showForgottenOnly ? "🎉 全部チェック済みです！" : "アイテムがありません"}</div>}
            </div>

            {/* アイテム追加 */}
            <div style={{ background: "white", borderRadius: 16, padding: "16px", marginTop: 16, boxShadow: "0 2px 12px rgba(0,0,0,0.07)" }}>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 10, fontWeight: "bold" }}>{isBaseEditMode ? "＋ 基本データにアイテムを追加" : "＋ アイテムを追加（今回のみ）"}</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input value={newItemName} onChange={e => setNewItemName(e.target.value)} onKeyDown={e => e.key === "Enter" && addItem()} placeholder="持ち物の名前" style={{ flex: 1, border: "1.5px solid #eee", borderRadius: 10, padding: "8px 12px", fontSize: 14, outline: "none" }} />
                <button onClick={addItem} style={{ background: travelerData?.color || scene.color, color: "white", border: "none", borderRadius: 10, padding: "8px 16px", fontWeight: "bold", cursor: "pointer", fontSize: 18 }}>＋</button>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setNewItemCategory(cat.id)} style={{ padding: "4px 10px", borderRadius: 14, border: `1.5px solid ${newItemCategory === cat.id ? cat.color : "#eee"}`, background: newItemCategory === cat.id ? cat.color : "white", color: newItemCategory === cat.id ? "white" : "#777", fontSize: 11, cursor: "pointer" }}>{cat.label}</button>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ==================== メインApp ====================
function App() {
  const [currentScene, setCurrentScene] = useState(null);
  if (currentScene) return <PackingList scene={currentScene} onBack={() => setCurrentScene(null)} />;
  return <Home onSelectScene={setCurrentScene} />;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
